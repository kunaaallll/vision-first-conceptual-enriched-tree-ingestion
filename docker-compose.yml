services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: visionrag
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/visionrag
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads:/app/uploads
      - vision_cache:/app/.vision_cache
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  vision_cache:
